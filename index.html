<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Dashboard</title>
    <style>
        .tab {
            display: none;
        }
        .tablink {
            cursor: pointer;
            padding: 10px;
            margin: 5px;
        }
    </style>
    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";  
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>
</head>
<body>
    <h1>Unified Dashboard</h1>
    <div>
        <button class="tablink" onclick="openTab(event, 'Pomodoro')">Pomodoro Timer</button>
        <button class="tablink" onclick="openTab(event, 'ToDo')">To-Do List</button>
        <button class="tablink" onclick="openTab(event, 'Jokes')">Joke Generator</button>
    </div>

    <div id="Pomodoro" class="tab">
        <h2>Pomodoro Timer</h2>
        <p>Timer content goes here.</p>
    </div>

    <div id="ToDo" class="tab">
        <h2>To-Do List</h2>
        <p>To-Do list content goes here.</p>
    </div>

    <div id="Jokes" class="tab">
        <h2>Joke Generator</h2>
        <p>Joke content goes here.</p>
    </div>

    <script>
        // Open the Pomodoro tab by default
        document.getElementsByClassName("tablink")[0].click();
    </script>
</body>
</html>
