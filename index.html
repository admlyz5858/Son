<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Pomodoro Timer</h1>
        
        <div class="timer-display">
            <div class="time" id="time">25:00</div>
            <div class="session-label" id="sessionLabel">Work Time</div>
        </div>

        <div class="controls">
            <button id="startBtn" class="btn btn-start">Start</button>
            <button id="pauseBtn" class="btn btn-pause" disabled>Pause</button>
            <button id="resetBtn" class="btn btn-reset">Reset</button>
        </div>

        <div class="settings">
            <div class="setting-group">
                <label for="workDuration">Work Duration (min):</label>
                <input type="number" id="workDuration" min="1" max="60" value="25">
            </div>
            <div class="setting-group">
                <label for="breakDuration">Break Duration (min):</label>
                <input type="number" id="breakDuration" min="1" max="30" value="5">
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-label">Sessions Completed:</span>
                <span class="stat-value" id="sessionsCompleted">0</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
